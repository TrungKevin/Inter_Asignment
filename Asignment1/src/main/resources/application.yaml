server:
  port: 8080
  tomcat:
    connection-timeout: 900000

app:
  frontend-url: http://localhost:4200
  report:
    jdbc:
      fetch-size: 1000
    virtualizer:
      max-pages: 100
      block-size: 4096
      min-grow-count: 200
      swap-dir: ${java.io.tmpdir}/jasper-swap
    concurrency:
      pdf-xlsx: 2 #Chỉ cho phép tối đa 2 người xuất file PDF hoặc Excel cùng một lúc
      acquire-timeout-seconds: 30 #Thời gian chờ tối đa để xuất file (30 giây)
    # File xuất từ job bất đồng bộ (POST /api/reports/jobs)
    storage-dir: ${java.io.tmpdir}/report-exports
    cache:
      enabled: true
      ttl-minutes: 10
      key-prefix: report
      policy: shared-admin
      lock:
        ttl-seconds: 180
        wait-timeout-ms: 120000
        poll-interval-ms: 500
    cleanup:
      enabled: true
      retention-hours: 24
      fixed-delay-ms: 1800000
      initial-delay-ms: 60000

camunda:
  bpm:
    # Tạo tài khoản admin mặc định để đăng nhập vào Webapps (Cockpit/Tasklist)
    admin-user:
      id: admin
      password: admin
      first-name: Admin

    # Tự động cập nhật/tạo bảng Camunda trong database hiện tại
    database:
      schema-update: true
      # Nếu dùng chung DB với app, Camunda sẽ tự tạo các bảng tiền tố act_

    # Bật Job Executor để xử lý các tác vụ bất đồng bộ (Async)
    job-execution:
      enabled: true
      deployment-aware: true

    # Tự động quét và triển khai các file BPMN trong folder resources
    auto-deployment-enabled: true

